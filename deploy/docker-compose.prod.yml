version: '3'

services:
  postgres:
    container_name: postgres
    image: postgres:14
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    container_name: nakama
    image: registry.heroiclabs.com/heroiclabs/nakama:3.21.1
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/nakama &&
        exec /nakama/nakama --config /nakama/data/local.yml
        --database.address postgres:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/nakama
        --runtime.js_entrypoint tictactoe.js
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nakama-data:/nakama/data
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    environment:
      - NAKAMA_CONSOLE_PASSWORD=${NAKAMA_CONSOLE_PASSWORD:-adminpass}

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - nakama
    restart: always

volumes:
  pgdata:
